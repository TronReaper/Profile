<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TronReaper</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0f;
            --bg-card: rgba(13, 17, 23, 0.85);
            --accent: #1e3a5f;
            --accent-glow: #3d7abd;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --miyabi: #c9a0dc;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 30% 50%, rgba(30, 58, 95, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(201, 160, 220, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-glow);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1); }
        }

        .main-card {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 500px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(30, 58, 95, 0.3);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(30, 58, 95, 0.1);
            animation: cardFloat 6s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .profile {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }

        /* Square image becomes circle automatically */
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            object-fit: cover;
            background: linear-gradient(135deg, #1a2744, #0f1729);
            display: block;
        }

        .avatar-placeholder {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            background: linear-gradient(135deg, #1a2744, #0f1729);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .avatar-placeholder i {
            font-size: 32px;
            color: var(--accent-glow);
            opacity: 0.5;
        }

        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 16px;
            height: 16px;
            background: #3fb950;
            border: 3px solid var(--bg);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.4); }
            50% { box-shadow: 0 0 0 6px rgba(63, 185, 80, 0); }
        }

        .profile h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--text), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .profile .tag {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(30, 58, 95, 0.15);
            border: 1px solid rgba(30, 58, 95, 0.3);
            color: var(--text-dim);
            padding: 10px 20px;
            border-radius: 12px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            background: rgba(30, 58, 95, 0.3);
            color: var(--text);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            color: var(--text);
            border-color: var(--accent-glow);
            box-shadow: 0 4px 20px rgba(30, 58, 95, 0.4);
        }

        .content {
            min-height: 200px;
        }

        .content-section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: var(--accent-glow);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            font-size: 1rem;
        }

        .about-text {
            color: var(--text-dim);
            line-height: 1.7;
            font-size: 1rem;
        }

        /* Game cards */
        .game-card {
            background: rgba(30, 58, 95, 0.1);
            border: 1px solid rgba(30, 58, 95, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .game-card:hover {
            background: rgba(30, 58, 95, 0.2);
            border-color: rgba(30, 58, 95, 0.4);
            transform: scale(1.02);
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .game-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .game-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
        }

        .game-name span {
            display: block;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 400;
        }

        .game-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-top: 1px solid rgba(30, 58, 95, 0.15);
        }

        .game-stat-label {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .game-stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
        }

        .full-details-btn {
            display: block;
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            border: none;
            border-radius: 10px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        .full-details-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30, 58, 95, 0.4);
        }

        .full-details-btn i {
            margin-left: 6px;
        }

        /* Minecraft simple */
        .mc-simple {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(126, 200, 80, 0.05);
            border: 1px solid rgba(126, 200, 80, 0.15);
            border-radius: 12px;
        }

        .mc-simple i {
            font-size: 28px;
            color: #7ec850;
        }

        .mc-simple div {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .mc-simple .mc-name {
            color: #7ec850;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
        }

        /* Social grid */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .social-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 20px 10px;
            background: rgba(30, 58, 95, 0.1);
            border: 1px solid rgba(30, 58, 95, 0.2);
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-dim);
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            transform: translateY(-4px);
            background: rgba(30, 58, 95, 0.25);
            border-color: var(--accent-glow);
            color: var(--text);
            box-shadow: 0 8px 25px rgba(30, 58, 95, 0.2);
        }

        .social-btn i {
            font-size: 1.6rem;
            transition: transform 0.3s;
        }

        .social-btn:hover i {
            transform: scale(1.15);
        }

        .social-btn span {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Discord info style */
        .discord-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: rgba(88, 101, 242, 0.08);
            border: 1px solid rgba(88, 101, 242, 0.2);
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .discord-info i {
            font-size: 28px;
            color: #5865f2;
        }

        .discord-info div {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .discord-info .dc-user {
            color: #5865f2;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(30, 58, 95, 0.2);
            color: var(--text-dim);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .footer .heart {
            color: var(--miyabi);
            display: inline-block;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @media (max-width: 480px) {
            .main-card {
                padding: 25px 20px;
                width: 95%;
            }

            .tabs {
                gap: 6px;
            }

            .tab-btn {
                padding: 8px 14px;
                font-size: 0.8rem;
            }

            .profile h1 {
                font-size: 1.5rem;
            }

            .social-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="main-card">
        <!-- Profile -->
        <div class="profile">
            <div class="avatar-wrap">
                <!-- Replace this placeholder with your image -->
                <div class="avatar-placeholder">
                    <i class="fas fa-user"></i>
                </div>
                <!-- <img src="avatar.png" class="avatar" alt="TronReaper"> -->
                <div class="status-dot"></div>
            </div>
            <h1>TRONREAPER</h1>
        </div>

        <!-- Tab Buttons -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('about')">
                <i class="fas fa-user"></i> About
            </button>
            <button class="tab-btn" onclick="showTab('games')">
                <i class="fas fa-gamepad"></i> Games
            </button>
            <button class="tab-btn" onclick="showTab('social')">
                <i class="fas fa-link"></i> Socials
            </button>
        </div>

        <!-- Content Area -->
        <div class="content">
            <!-- About -->
            <div id="about" class="content-section active">
                <div class="about-text">
                    what is life
                </div>
            </div>

            <!-- Games -->
            <div id="games" class="content-section">
                <!-- ZZZ -->
                <div class="game-card">
                    <div class="game-header">
                        <div class="game-icon">⚡</div>
                        <div class="game-name">
                            Zenless Zone Zero
                            <span>Inter-Knot Operations</span>
                        </div>
                    </div>
                    <div class="game-stat">
                        <span class="game-stat-label">Agents Owned</span>
                        <span class="game-stat-value">30</span>
                    </div>
                    <a href="https://act.hoyolab.com/app/zzz-game-record/index.html?hyl_presentation_style=fullscreen&bbs_auth_required=true&game_id=8&user_id=251390237&lang=en-us&bbs_theme=dark&bbs_theme_device=1&utm_source=share&utm_medium=link&utm_campaign=web#/zzz" class="full-details-btn" target="_blank">
                        Full Details <i class="fas fa-external-link-alt"></i>
                    </a>
                </div>

                <!-- Minecraft -->
                <div class="mc-simple">
                    <i class="fas fa-cube"></i>
                    <div>
                        <div class="mc-name">TronReaperMC</div>
                        <div>Minecraft Username</div>
                    </div>
                </div>
            </div>

            <!-- Socials -->
            <div id="social" class="content-section">
                <!-- Discord info -->
                <div class="discord-info">
                    <i class="fab fa-discord"></i>
                    <div>
                        <div class="dc-user">tronreaper</div>
                        <div>Discord Username</div>
                    </div>
                </div>

                <div class="social-grid">
                    <a href="#" class="social-btn" target="_blank">
                        <i class="fab fa-twitch" style="color: #9146ff;"></i>
                        <span>TWITCH</span>
                    </a>
                    <a href="#" class="social-btn" target="_blank">
                        <i class="fab fa-youtube" style="color: #ff0000;"></i>
                        <span>YOUTUBE</span>
                    </a>
                    <a href="#" class="social-btn" target="_blank">
                        <i class="fab fa-twitter" style="color: #1da1f2;"></i>
                        <span>TWITTER</span>
                    </a>
                    <a href="#" class="social-btn" target="_blank">
                        <i class="fab fa-instagram" style="color: #e4405f;"></i>
                        <span>INSTAGRAM</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            Made with <span class="heart">♥</span> by TronReaper
        </div>
    </div>

    <script>
        function showTab(tabName) {
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');
            event.target.closest('.tab-btn').classList.add('active');
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 10 + 10) + 's';
                p.style.animationDelay = (Math.random() * 15) + 's';
                p.style.width = (Math.random() * 3 + 2) + 'px';
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        }

        createParticles();
    </script>
</body>
</html>
